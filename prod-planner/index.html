<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aria Technologies — Manufacturing Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f4f6f9;color:#1a1a2e;font-size:13px}
.page{max-width:1400px;margin:0 auto;padding:20px}

.header{background:#0d1b4b;color:#fff;padding:18px 24px;border-radius:10px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-left .company{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#8fa8d0;margin-bottom:4px}
.header-left .main-title{font-size:20px;font-weight:700;color:#fff}
.btn-print{background:#378ADD;color:#fff;border:none;padding:8px 18px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.03em}
.btn-print:hover{background:#185FA5}

.controls{background:#fff;border-radius:10px;padding:14px 20px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.lbl{font-size:12px;color:#64748b;white-space:nowrap;font-weight:500}
.proj-input{font-size:13px;font-weight:600;padding:6px 12px;border-radius:7px;border:1px solid #cbd5e1;background:#f8fafc;color:#1a1a2e;width:240px}
.proj-input:focus{outline:none;border-color:#378ADD;background:#fff}
input[type=date]{font-size:12px;padding:6px 10px;border-radius:7px;border:1px solid #cbd5e1;background:#f8fafc;color:#1a1a2e}
input[type=date]:focus{outline:none;border-color:#378ADD}
.btn-add{padding:6px 14px;font-size:12px;font-weight:600;border:1px solid #378ADD;border-radius:7px;background:#fff;color:#185FA5;cursor:pointer}
.btn-add:hover{background:#E6F1FB}

.scards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
.sc{background:#fff;border-radius:10px;padding:12px 16px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sc .sl{font-size:11px;color:#64748b;margin-bottom:4px;font-weight:500}
.sc .sv{font-size:20px;font-weight:700;color:#0d1b4b}

.sec{font-size:11px;font-weight:700;color:#64748b;letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;padding-left:2px}
.tbl-wrap{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:auto;max-height:400px;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{background:#f1f5f9;font-weight:700;font-size:11px;color:#475569;text-align:left;padding:8px 9px;border-bottom:1.5px solid #e2e8f0;position:sticky;top:0;z-index:2;white-space:nowrap;overflow:hidden}
td{padding:6px 8px;border-bottom:1px solid #f1f5f0;vertical-align:middle;overflow:hidden}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
.ei{border:1px solid #e2e8f0;border-radius:5px;padding:4px 6px;font-size:11px;background:#fff;color:#1a1a2e;width:100%;font-family:inherit}
.ei:focus{outline:none;border-color:#378ADD;background:#f0f7ff}
.ei-mono{font-family:Courier New,monospace;font-size:10px}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.ns{background:#dbeafe;color:#1e40af}
.ip{background:#fef3c7;color:#92400e}
.dn{background:#dcfce7;color:#166534}
.nd{background:#f1f5f9;color:#64748b}
.del-btn{background:transparent;border:none;cursor:pointer;color:#94a3b8;font-size:16px;padding:1px 6px;border-radius:4px;line-height:1}
.del-btn:hover{color:#dc2626;background:#fee2e2}

.gantt-section{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.gantt-scroll{overflow-x:auto}
.gantt-inner{display:inline-block;min-width:100%}
.gh-row{display:flex;background:#f1f5f9;border-bottom:1.5px solid #e2e8f0}
.gh-lbl{width:220px;min-width:220px;padding:6px 10px;font-size:10px;font-weight:700;color:#475569;border-right:1px solid #e2e8f0;flex-shrink:0}
.gh-day{width:22px;min-width:22px;font-size:8px;color:#64748b;text-align:center;padding:4px 0;border-right:1px solid #f1f5f0;flex-shrink:0;overflow:hidden;line-height:1.2}
.gh-day.we{color:#dc2626;background:#fef2f2}
.gr-row{display:flex;border-bottom:1px solid #f1f5f0}
.gr-row:last-child{border-bottom:none}
.gr-lbl{width:220px;min-width:220px;padding:5px 10px;font-size:10px;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-right:1px solid #e2e8f0;flex-shrink:0}
.gc{width:22px;min-width:22px;height:28px;border-right:1px solid #f8fafc;flex-shrink:0}
.gc.we{background:#fef2f2}
.gc.bar{background:#378ADD}
.gc.bar-s{background:#378ADD;border-radius:5px 0 0 5px}
.gc.bar-e{background:#378ADD;border-radius:0 5px 5px 0}
.gc.bar-se{background:#378ADD;border-radius:5px}
.legend{display:flex;gap:16px;align-items:center;padding:8px 12px;background:#f8fafc;border-top:1px solid #e2e8f0;font-size:10px;color:#64748b}
.leg-item{display:flex;align-items:center;gap:5px}
.leg-dot{width:12px;height:12px;border-radius:2px}

@media print{
  body{background:#fff!important;font-size:11px}
  .page{padding:8px;max-width:none}
  .no-print{display:none!important}
  .header{background:#0d1b4b!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;border-radius:6px;padding:12px 16px;margin-bottom:10px}
  .controls{padding:8px 12px;margin-bottom:8px;box-shadow:none}
  .proj-input,.btn-add{display:none!important}
  .lbl-proj-name{display:inline!important}
  .tbl-wrap{max-height:none!important;overflow:visible!important;box-shadow:none;margin-bottom:12px;border:1.5px solid #cbd5e1}
  table{font-size:9px!important}
  th{padding:5px 6px!important;font-size:9px!important}
  td{padding:4px 6px!important}
  .ei{border:none!important;background:transparent!important;font-size:9px!important;padding:0!important;pointer-events:none}
  .del-btn{display:none!important}
  .gantt-section{box-shadow:none;border:1.5px solid #cbd5e1;page-break-before:always}
  .gantt-scroll{overflow:visible!important}
  .gantt-inner{width:100%}
  .gh-lbl,.gr-lbl{width:160px!important;min-width:160px!important;font-size:9px!important}
  .gh-day,.gc{width:16px!important;min-width:16px!important}
  .gh-day{font-size:7px!important;padding:2px 0!important}
  .gc{height:22px!important}
  .gh-row,.gr-row{display:flex!important}
  .gc.bar,.gc.bar-s,.gc.bar-e,.gc.bar-se{background:#378ADD!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .gc.we,.gh-day.we{background:#fef2f2!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .sc{box-shadow:none;border:1px solid #cbd5e1}
  .scards{margin-bottom:10px}
  .sec{margin-bottom:5px}
}
</style>
</head>
<body>
<div class="page">

<div class="header">
  <div class="header-left">
    <div class="company">Aria Technologies</div>
    <div class="main-title" id="headerTitle">Manufacturing Planner</div>
  </div>
  <button class="btn-print no-print" onclick="doPrint()">Print / Export PDF</button>
</div>

<div class="controls">
  <span class="lbl">Project</span>
  <input class="proj-input" id="projName" placeholder="Enter project name..." value="LR-340 C-Axis Assembly">
  <span class="lbl" style="margin-left:8px">Start date</span>
  <input type="date" id="startDate">
  <button class="btn-add no-print" onclick="addItem()" style="margin-left:6px">+ Add item</button>
</div>

<div class="scards" id="scards"></div>

<div class="sec">Items</div>
<div class="tbl-wrap">
<table>
<colgroup>
  <col style="width:32px"><col style="width:90px"><col style="width:150px">
  <col style="width:100px"><col style="width:40px"><col style="width:58px">
  <col style="width:110px"><col style="width:85px"><col style="width:85px">
  <col style="width:46px"><col style="width:78px"><col style="width:28px">
</colgroup>
<thead><tr>
  <th>#</th>
  <th>ERP code</th>
  <th>Description</th>
  <th>Part number</th>
  <th>Qty</th>
  <th>Lead (hrs)</th>
  <th>Machine</th>
  <th>Start date</th>
  <th>End date</th>
  <th>W.days</th>
  <th>Status</th>
  <th class="no-print"></th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="sec">Gantt chart</div>
<div class="gantt-section">
  <div class="gantt-scroll"><div class="gantt-inner" id="gantt"></div></div>
  <div class="legend">
    <span class="leg-item"><span class="leg-dot" style="background:#378ADD"></span>Working days</span>
    <span class="leg-item"><span class="leg-dot" style="background:#fef2f2;border:1px solid #fca5a5"></span>Weekend (Fri–Sat)</span>
  </div>
</div>

</div>
<script>
let items=[
  {id:1,erp:"RM-02782",desc:"LR 340 C Axis V3",pn:"",qty:4,hrs:8,machine:"CNC Milling"},
  {id:2,erp:"RM-02698",desc:"Motor Mount Plate",pn:"P60-00-04-0P-00001-R00-01",qty:4,hrs:4,machine:"CNC Milling"},
  {id:3,erp:"RM-02759",desc:"Fixation Arm",pn:"LRGN0/03-C0-007",qty:8,hrs:3.2,machine:"CNC Milling"},
  {id:4,erp:"RM-02758",desc:"Rotation Plate V2",pn:"LRGN0/03-C0-006",qty:4,hrs:3.2,machine:"CNC Milling"},
  {id:5,erp:"RM-02639",desc:"C-Axis GearBox Mount Plate",pn:"LRGN0/01-A0-003",qty:4,hrs:4,machine:"CNC Milling"},
  {id:6,erp:"RM-02719",desc:"C-Axis Cross Bearing Mount Plate",pn:"LRGN0/01-A0-006",qty:4,hrs:2.4,machine:"CNC Milling"},
  {id:7,erp:"RM-02630",desc:"Rotation Shaft Female",pn:"LRGNO/03-C0-003",qty:4,hrs:8,machine:"CNC Turning"},
  {id:8,erp:"RM-02631",desc:"Rotation Shaft Male",pn:"LRGNO/02-C0-002",qty:4,hrs:8,machine:"CNC Turning"},
  {id:9,erp:"RM-02761",desc:"Cross Bearing Mount Spacer",pn:"LRGN0/03-C0-005",qty:16,hrs:1.6,machine:"CNC Turning"},
  {id:10,erp:"RM-02760",desc:"C Axis Motor Mount Spacer",pn:"LRGN0/03-C0-004",qty:16,hrs:1.6,machine:"CNC Turning"},
  {id:11,erp:"RM-02777",desc:"Steel PIN D5x28x1.2mm",pn:"DIN EN 22340-B-5x28x1.2",qty:0,hrs:0.8,machine:""},
  {id:12,erp:"RM-03017",desc:"Pallet Dispenser-Robot EOA",pn:"",qty:4,hrs:8,machine:"Assembly"},
  {id:13,erp:"RM-03011",desc:"Pallet Gripper EOA Rib Support",pn:"PDEOA-01-0P-S60-00001-01",qty:4,hrs:3.04,machine:"CNC Milling"},
  {id:14,erp:"RM-03012",desc:"Pallet Gripper EOA Adaptor",pn:"PDEOA-01-0P-S60-00002-01",qty:4,hrs:3.2,machine:"CNC Milling"},
  {id:15,erp:"RM-03013",desc:"Pallet Gripper EOA Main Supports",pn:"PDEOA-01-0P-S60-00003-01",qty:8,hrs:16,machine:"CNC Milling"},
  {id:16,erp:"RM-03014",desc:"Pallet Gripper EOA Rotation Shaft",pn:"PDEOA-01-0P-S60-00004-01",qty:8,hrs:14,machine:"CNC Turning"},
  {id:17,erp:"RM-03015",desc:"Pallet Gripper EOA Came",pn:"PDEOA-01-0P-S60-00005-01",qty:8,hrs:8,machine:"CNC Milling"},
  {id:18,erp:"RM-03016",desc:"Pallet Gripper EOA Gripper",pn:"PDEOA-01-0P-S60-00006-01",qty:16,hrs:3.04,machine:"CNC Milling"},
];
let nid=19;

function isWE(d){const w=d.getDay();return w===5||w===6;}
function cloneDay(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate());}

function skipWE(d){
  const r=cloneDay(d);
  while(isWE(r))r.setDate(r.getDate()+1);
  return r;
}

function countWD(a,b){
  let count=0,d=cloneDay(a);
  const end=cloneDay(b);
  while(d<=end){if(!isWE(d))count++;d.setDate(d.getDate()+1);}
  return count;
}

function fmtD(d){
  if(!d)return"—";
  return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
}

function getBase(){
  const v=document.getElementById("startDate").value;
  if(!v)return null;
  const[y,m,day]=v.split("-").map(Number);
  return new Date(y,m-1,day);
}

/*
  Hour-aware continuous scheduler.
  Items share the same working day — next item starts where the previous left off.
  hoursLeft tracks remaining hours in the current day (0–8).
  When hoursLeft hits 0, the next item advances to the next working day.
*/
function computeSched(){
  const base=getBase();
  if(!base)return items.map(it=>({...it,start:null,end:null,wdays:0}));

  let curDay=skipWE(cloneDay(base));
  let hoursLeft=8;

  return items.map(it=>{
    // If previous item exactly filled the day, move to next working day
    if(hoursLeft<=0){
      curDay.setDate(curDay.getDate()+1);
      while(isWE(curDay))curDay.setDate(curDay.getDate()+1);
      hoursLeft=8;
    }

    const startDay=cloneDay(curDay);
    let rem=Math.max(it.hrs,0.0001);

    while(rem>0){
      const consume=Math.min(rem,hoursLeft);
      rem-=consume;
      hoursLeft-=consume;
      if(rem>0){
        // spill into next working day
        curDay.setDate(curDay.getDate()+1);
        while(isWE(curDay))curDay.setDate(curDay.getDate()+1);
        hoursLeft=8;
      }
    }

    const endDay=cloneDay(curDay);
    const wdays=countWD(startDay,endDay);
    return{...it,start:startDay,end:endDay,wdays};
  });
}

function today(){return cloneDay(new Date());}

function badge(s,e){
  if(!s||!e)return'<span class="badge nd">No date</span>';
  const t=today();
  if(t<s)return'<span class="badge ns">Not started</span>';
  if(t>e)return'<span class="badge dn">Done</span>';
  return'<span class="badge ip">In progress</span>';
}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");}

function upd(id,f,v){
  items=items.map(it=>it.id===id?{...it,[f]:(f==="hrs"||f==="qty")?+v:v}:it);
  render();
}
function delItem(id){items=items.filter(it=>it.id!==id);render();}
function addItem(){
  items.push({id:nid++,erp:"RM-NEW",desc:"New item",pn:"",qty:1,hrs:8,machine:""});
  render();
}

function render(){
  const sched=computeSched();
  renderSummary(sched);
  renderTable(sched);
  renderGantt(sched);
  const proj=document.getElementById("projName").value||"Manufacturing Planner";
  document.getElementById("headerTitle").textContent=proj;
}

function renderSummary(sched){
  const base=getBase();
  const totHrs=items.reduce((a,b)=>a+b.hrs,0);
  const ends=sched.filter(x=>x.end).map(x=>x.end.getTime());
  const pEnd=ends.length?new Date(Math.max(...ends)):null;
  const wd=base&&pEnd?countWD(base,pEnd):0;
  document.getElementById("scards").innerHTML=`
    <div class="sc"><div class="sl">Total items</div><div class="sv">${items.length}</div></div>
    <div class="sc"><div class="sl">Total hours</div><div class="sv">${totHrs.toFixed(1)}</div></div>
    <div class="sc"><div class="sl">Working days</div><div class="sv">${wd||"—"}</div></div>
    <div class="sc"><div class="sl">Project end date</div><div class="sv" style="font-size:14px">${fmtD(pEnd)||"—"}</div></div>
  `;
}

function renderTable(sched){
  const tb=document.getElementById("tbody");
  if(!items.length){
    tb.innerHTML=`<tr><td colspan="12" style="text-align:center;padding:2rem;color:#94a3b8">No items — click "+ Add item"</td></tr>`;
    return;
  }
  tb.innerHTML=sched.map((it,i)=>`<tr>
    <td style="text-align:center;color:#94a3b8;font-size:11px">${i+1}</td>
    <td><input class="ei ei-mono" value="${esc(it.erp)}" onchange="upd(${it.id},'erp',this.value)"></td>
    <td><input class="ei" value="${esc(it.desc)}" onchange="upd(${it.id},'desc',this.value)"></td>
    <td><input class="ei ei-mono" value="${esc(it.pn)}" onchange="upd(${it.id},'pn',this.value)"></td>
    <td><input class="ei" type="number" min="0" value="${it.qty}" onchange="upd(${it.id},'qty',this.value)" style="text-align:center"></td>
    <td><input class="ei" type="number" min="0" step="0.5" value="${it.hrs}" onchange="upd(${it.id},'hrs',this.value)" style="text-align:center"></td>
    <td><input class="ei" value="${esc(it.machine)}" onchange="upd(${it.id},'machine',this.value)" placeholder="e.g. CNC Milling"></td>
    <td style="white-space:nowrap;font-size:11px;color:#475569">${fmtD(it.start)}</td>
    <td style="white-space:nowrap;font-size:11px;color:#475569">${fmtD(it.end)}</td>
    <td style="text-align:center;font-size:11px;font-weight:600;color:#0d1b4b">${it.wdays||"—"}</td>
    <td>${badge(it.start,it.end)}</td>
    <td class="no-print"><button class="del-btn" onclick="delItem(${it.id})">×</button></td>
  </tr>`).join("");
}

function renderGantt(sched){
  const g=document.getElementById("gantt");
  const base=getBase();
  const valid=sched.filter(x=>x.start&&x.end);
  if(!base||!valid.length){
    g.innerHTML=`<div style="padding:2rem;text-align:center;font-size:12px;color:#94a3b8">Set a start date to see the Gantt chart</div>`;
    return;
  }
  const projEnd=new Date(Math.max(...valid.map(x=>x.end.getTime())));
  const totalDays=Math.ceil((projEnd.getTime()-base.getTime())/864e5)+4;

  let html='<div style="display:inline-block;min-width:max-content">';

  html+='<div class="gh-row">';
  html+='<div class="gh-lbl">Item (ERP — Description)</div>';
  for(let i=0;i<totalDays;i++){
    const d=new Date(base.getFullYear(),base.getMonth(),base.getDate()+i);
    const we=isWE(d);
    const isMon=d.getDay()===0;
    const lbl=isMon?d.toLocaleDateString("en-GB",{day:"2-digit",month:"short"}):"";
    html+=`<div class="gh-day${we?" we":""}">${lbl}</div>`;
  }
  html+='</div>';

  sched.forEach(it=>{
    html+='<div class="gr-row">';
    html+=`<div class="gr-lbl" title="${esc(it.erp)} — ${esc(it.desc)}">${esc(it.erp)} — ${esc(it.desc)}</div>`;
    for(let i=0;i<totalDays;i++){
      const d=new Date(base.getFullYear(),base.getMonth(),base.getDate()+i);
      const we=isWE(d);
      let cls="gc";
      if(we){cls+=" we";}
      else if(it.start&&it.end){
        const dT=d.getTime();
        const sT=it.start.getTime();
        const eT=it.end.getTime();
        if(dT>=sT&&dT<=eT){
          const isS=(dT===sT),isE=(dT===eT);
          if(isS&&isE)cls+=" bar-se";
          else if(isS)cls+=" bar-s";
          else if(isE)cls+=" bar-e";
          else cls+=" bar";
        }
      }
      html+=`<div class="${cls}"></div>`;
    }
    html+='</div>';
  });

  html+='</div>';
  g.innerHTML=html;
}

function doPrint(){window.print();}

document.getElementById("startDate").addEventListener("change",render);
document.getElementById("projName").addEventListener("input",render);
document.getElementById("startDate").value=new Date().toISOString().split("T")[0];
render();
</script>
</body>
</html>
