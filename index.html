<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aria Technologies — Manufacturing Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#eef1f7;color:#1a1a2e;font-size:13px}
.page{max-width:1500px;margin:0 auto;padding:16px}

.header{background:#0d1b4b;color:#fff;padding:0;border-radius:10px;margin-bottom:10px;display:flex;flex-direction:column;overflow:hidden}
.header-top{padding:6px 22px;background:#07102e;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08)}
.header-top .doc-type-label{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#378ADD}
.header-top .doc-type-label span{color:#7a9cc8;font-weight:400;margin-left:10px;letter-spacing:.06em}
.header-main{padding:12px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.hl .ht-input{font-size:19px;font-weight:700;color:#fff;background:transparent;border:none;border-bottom:1.5px solid rgba(255,255,255,.25);outline:none;padding:2px 4px;min-width:220px;width:auto}
.hl .ht-input:focus{border-bottom-color:rgba(255,255,255,.8)}
.hl .ht-input::placeholder{color:rgba(255,255,255,.35)}
.hbtn{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;font-size:12px;font-weight:600;border:none;border-radius:7px;cursor:pointer}
.btn-print{background:#378ADD;color:#fff}.btn-print:hover{background:#185FA5}

.proj-tabs-wrap{background:#fff;border-radius:10px;padding:10px 16px;margin-bottom:10px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.04);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tab-btn{padding:5px 14px;font-size:12px;font-weight:600;border:1.5px solid #cbd5e1;border-radius:20px;background:#f8fafc;color:#475569;cursor:pointer;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.tab-btn.active{background:#0d1b4b;color:#fff;border-color:#0d1b4b}
.tab-btn:hover:not(.active){background:#e8ecf5}
.tab-add{padding:5px 12px;font-size:12px;font-weight:700;border:1.5px dashed #94a3b8;border-radius:20px;background:transparent;color:#64748b;cursor:pointer}
.tab-add:hover{border-color:#378ADD;color:#185FA5}
.tab-x{font-size:12px;color:inherit;opacity:.6;line-height:1;padding:0;background:none;border:none;cursor:pointer;margin-left:2px}
.tab-x:hover{opacity:1}

.plan-tabs-wrap{background:#f8fafc;border-radius:8px;padding:8px 14px;margin-bottom:10px;border:1px solid #e2e8f0;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.plan-tab{padding:4px 12px;font-size:11px;font-weight:600;border:1px solid #cbd5e1;border-radius:14px;background:#fff;color:#475569;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.plan-tab.active{background:#185FA5;color:#fff;border-color:#185FA5}
.plan-tab:hover:not(.active){background:#dbeafe}
.plan-add{padding:4px 10px;font-size:11px;border:1px dashed #94a3b8;border-radius:14px;background:transparent;color:#64748b;cursor:pointer}
.plan-add:hover{border-color:#378ADD;color:#185FA5}
.plan-x{font-size:11px;color:inherit;opacity:.6;padding:0;background:none;border:none;cursor:pointer}
.plan-x:hover{opacity:1}

.controls{background:#fff;border-radius:10px;padding:11px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.lbl{font-size:11px;color:#64748b;font-weight:600;white-space:nowrap}
.proj-input{font-size:13px;font-weight:600;padding:5px 10px;border-radius:7px;border:1px solid #cbd5e1;background:#f8fafc;color:#1a1a2e;width:220px}
.proj-input:focus{outline:none;border-color:#378ADD;background:#fff}
input[type=date]{font-size:12px;padding:5px 9px;border-radius:7px;border:1px solid #cbd5e1;background:#f8fafc;color:#1a1a2e}
input[type=date]:focus{outline:none;border-color:#378ADD}
.btn-add{padding:5px 13px;font-size:12px;font-weight:600;border:1.5px solid #378ADD;border-radius:7px;background:#fff;color:#185FA5;cursor:pointer}
.btn-add:hover{background:#E6F1FB}
.view-toggle{display:flex;gap:4px;margin-left:auto}
.vt-btn{padding:5px 11px;font-size:11px;font-weight:600;border:1px solid #cbd5e1;border-radius:6px;background:#f8fafc;color:#475569;cursor:pointer}
.vt-btn.active{background:#0d1b4b;color:#fff;border-color:#0d1b4b}

.prio-toggle{display:flex;align-items:center;gap:6px}
.toggle-sw{position:relative;width:34px;height:18px;cursor:pointer;display:inline-block}
.toggle-sw input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:#cbd5e1;border-radius:18px;transition:.2s}
.toggle-sw input:checked+.toggle-track{background:#378ADD}
.toggle-thumb{position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:.2s;pointer-events:none}
.toggle-sw input:checked~.toggle-thumb{left:18px}

.scards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:12px}
.sc{background:#fff;border-radius:9px;padding:10px 14px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sc .sl{font-size:10px;color:#64748b;margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.sc .sv{font-size:18px;font-weight:700;color:#0d1b4b}

/* MACHINE VIEW */
.machine-view{display:none;margin-bottom:18px}
.machine-view.show{display:block}
.mv-card{background:#fff;border-radius:10px;border:1px solid #e2e8f0;margin-bottom:12px;overflow:visible;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.mv-header{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-radius:10px 10px 0 0;border-bottom:1px solid #e2e8f0}
.mh-left{display:flex;align-items:center;gap:12px}
.mh-name{font-size:14px;font-weight:700}
.mh-stats{font-size:11px;color:#64748b;display:flex;gap:14px;flex-wrap:wrap}
.mh-start{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#475569}
.mh-start input[type=date]{font-size:11px;padding:3px 7px;border-radius:5px;border:1px solid #cbd5e1;background:#f8fafc}
.mv-body{overflow-x:auto}
.mv-table{width:100%;border-collapse:collapse;font-size:12px}
.mv-table th{background:#f1f5f9;font-size:11px;font-weight:700;color:#475569;padding:7px 9px;border-bottom:1px solid #e2e8f0;white-space:nowrap;text-align:left}
.mv-table td{padding:6px 8px;border-bottom:1px solid #f4f6f8;vertical-align:middle}
.mv-table tr:last-child td{border-bottom:none}
.mv-table tr:hover td{background:#f8fafc}
.mv-table tr.mv-drag-over td{background:#dbeafe!important;border-top:2px solid #378ADD}
.mv-table tr.mv-dragging{opacity:.4}

.sec{font-size:11px;font-weight:700;color:#64748b;letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.sec-line{flex:1;height:1px;background:#e2e8f0}

.tbl-wrap{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:auto;max-height:440px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
table.main-tbl{width:100%;border-collapse:collapse;table-layout:fixed}
table.main-tbl th{background:#0d1b4b;font-weight:700;font-size:11px;color:#c8d8f0;text-align:left;padding:8px 8px;border-bottom:2px solid #1a3060;position:sticky;top:0;z-index:3;white-space:nowrap;overflow:hidden}
table.main-tbl td{padding:5px 7px;border-bottom:1px solid #f0f3f8;vertical-align:middle;overflow:visible}
table.main-tbl tr:last-child td{border-bottom:none}
table.main-tbl tr.drag-over td{background:#dbeafe!important;border-top:2px solid #378ADD}
table.main-tbl tr:hover td{background:#f8fafc}

.drag-handle{cursor:grab;color:#94a3b8;font-size:14px;padding:0 4px;user-select:none;display:flex;align-items:center;justify-content:center}
.drag-handle:active{cursor:grabbing}
tr.dragging{opacity:.4}

/* inputs */
.ei{border:1px solid #e2e8f0;border-radius:5px;padding:4px 6px;font-size:11px;background:#fff;color:#1a1a2e;width:100%;font-family:inherit}
.ei:focus{outline:none;border-color:#378ADD;background:#f0f7ff}
.ei-mono{font-family:'Courier New',monospace;font-size:10px}
.ei-c{text-align:center}
select.ei{cursor:pointer}

/* STATUS SELECT — manual only */
.status-sel{font-size:10px;padding:2px 6px;border-radius:20px;font-weight:600;border:none;cursor:pointer;width:100%}
.st-ns{background:#dbeafe;color:#1e40af}
.st-ip{background:#fef3c7;color:#92400e}
.st-dn{background:#dcfce7;color:#166534}
.st-oh{background:#f1f5f9;color:#64748b}

.prio{display:inline-block;font-size:9px;padding:2px 7px;border-radius:12px;font-weight:700;white-space:nowrap}
.p1{background:#fee2e2;color:#991b1b}
.p2{background:#fef3c7;color:#92400e}
.p3{background:#dbeafe;color:#1e40af}
.p4{background:#f1f5f9;color:#475569}

.del-btn{background:transparent;border:none;cursor:pointer;color:#94a3b8;font-size:15px;padding:1px 5px;border-radius:4px;line-height:1}
.del-btn:hover{color:#dc2626;background:#fee2e2}

/* MACHINE COMBO — fixed z-index and overflow */
.combo-wrap{position:relative;width:100%}
.combo-input{width:100%;padding:4px 22px 4px 6px;font-size:11px;border:1px solid #e2e8f0;border-radius:5px;background:#fff;color:#1a1a2e;font-family:inherit}
.combo-input:focus{outline:none;border-color:#378ADD;background:#f0f7ff}
.combo-arrow{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:9px;color:#94a3b8;pointer-events:none;user-select:none}
.combo-list{position:fixed;background:#fff;border:1.5px solid #378ADD;border-radius:8px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.16);min-width:140px;display:none;overflow:hidden}
.combo-list.open{display:block}
.combo-opt{padding:7px 12px;font-size:12px;cursor:pointer;color:#1a1a2e;border-bottom:1px solid #f0f3f8}
.combo-opt:last-child{border-bottom:none}
.combo-opt:hover{background:#dbeafe;color:#1e40af}

/* GANTT */
.gantt-section{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:14px}
.gantt-scroll{overflow-x:auto}
.gh-month-row{display:flex;background:#132254}
.gh-month-lbl{width:230px;min-width:230px;padding:4px 10px;font-size:9px;font-weight:700;color:#8fa8d0;border-right:1px solid #1a3060;flex-shrink:0}
.gh-month-cell{font-size:9px;font-weight:700;color:#8fa8d0;text-align:center;padding:3px 0;border-right:1px solid #1a3060;flex-shrink:0;overflow:hidden}
.gh-row{display:flex;background:#0d1b4b;border-bottom:2px solid #1a3060}
.gh-lbl{width:230px;min-width:230px;padding:6px 10px;font-size:10px;font-weight:700;color:#c8d8f0;border-right:1px solid #1a3060;flex-shrink:0}
.gh-day{width:20px;min-width:20px;font-size:8px;color:#8fa8d0;text-align:center;padding:4px 0;border-right:1px solid #1a3060;flex-shrink:0;overflow:hidden}
.gh-day.we{color:#f87171;background:#1a0a0a}
.gh-day.tod{border-right:2px solid #f59e0b!important}
.gr-row{display:flex;border-bottom:1px solid #f0f3f8}
.gr-row:last-child{border-bottom:none}
.gr-lbl{width:230px;min-width:230px;padding:5px 10px;font-size:10px;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-right:1px solid #e2e8f0;flex-shrink:0}
.gc{width:20px;min-width:20px;height:26px;border-right:1px solid #f5f7fa;flex-shrink:0}
.gc.we{background:#fff5f5}
.gc.tod{border-right:2px solid #f59e0b!important}
.gc.m0{background:#378ADD}.gc.m0-s{background:#378ADD;border-radius:4px 0 0 4px}.gc.m0-e{background:#378ADD;border-radius:0 4px 4px 0}.gc.m0-se{background:#378ADD;border-radius:4px}
.gc.m1{background:#7c3aed}.gc.m1-s{background:#7c3aed;border-radius:4px 0 0 4px}.gc.m1-e{background:#7c3aed;border-radius:0 4px 4px 0}.gc.m1-se{background:#7c3aed;border-radius:4px}
.gc.m2{background:#059669}.gc.m2-s{background:#059669;border-radius:4px 0 0 4px}.gc.m2-e{background:#059669;border-radius:0 4px 4px 0}.gc.m2-se{background:#059669;border-radius:4px}
.gc.m3{background:#d97706}.gc.m3-s{background:#d97706;border-radius:4px 0 0 4px}.gc.m3-e{background:#d97706;border-radius:0 4px 4px 0}.gc.m3-se{background:#d97706;border-radius:4px}
.gc.m4{background:#dc2626}.gc.m4-s{background:#dc2626;border-radius:4px 0 0 4px}.gc.m4-e{background:#dc2626;border-radius:0 4px 4px 0}.gc.m4-se{background:#dc2626;border-radius:4px}
.gc.m5{background:#0891b2}.gc.m5-s{background:#0891b2;border-radius:4px 0 0 4px}.gc.m5-e{background:#0891b2;border-radius:0 4px 4px 0}.gc.m5-se{background:#0891b2;border-radius:4px}
.gc.m6{background:#be185d}.gc.m6-s{background:#be185d;border-radius:4px 0 0 4px}.gc.m6-e{background:#be185d;border-radius:0 4px 4px 0}.gc.m6-se{background:#be185d;border-radius:4px}
.legend{display:flex;gap:12px;align-items:center;padding:8px 12px;background:#f8fafc;border-top:1px solid #e2e8f0;font-size:10px;color:#64748b;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px}
.leg-dot{width:11px;height:11px;border-radius:2px;flex-shrink:0}

@media print{
  body{background:#fff!important}
  .page{padding:6px;max-width:none}
  .no-print{display:none!important}
  .proj-tabs-wrap,.plan-tabs-wrap{display:none!important}
  .header{background:#0d1b4b!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:10px 14px;margin-bottom:8px}
  .tbl-wrap{max-height:none!important;overflow:visible!important;box-shadow:none;border:1px solid #ccc}
  table.main-tbl{font-size:8px!important}
  table.main-tbl th,table.main-tbl td{padding:3px 5px!important;font-size:8px!important}
  .ei,.combo-input{border:none!important;background:transparent!important;font-size:8px!important;padding:0!important;pointer-events:none}
  select.ei,.status-sel{-webkit-appearance:none;appearance:none;border:none!important;background:transparent!important}
  .del-btn,.drag-handle,.combo-arrow{display:none!important}
  .gantt-section{box-shadow:none;border:1px solid #ccc;page-break-before:always}
  .gantt-scroll{overflow:visible!important}
  .gh-row,.gh-month-row,.gr-row{display:flex!important}
  .gh-row{background:#0d1b4b!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  [class^="gc.m"],[class*=" gc.m"]{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .gc.we,.gh-day.we{background:#fff5f5!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .mv-card{overflow:visible!important;box-shadow:none;border:1px solid #ccc}
}
</style>
</head>
<body>
<div class="page">

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="doc-type-label">Manufacturing Planner <span>· Production Scheduling &amp; Machine Planning</span></div>
    <div class="hl co" style="color:#7a9cc8;font-size:9px;letter-spacing:.1em;text-transform:uppercase">Aria Technologies</div>
  </div>
  <div class="header-main">
    <div class="hl">
      <input class="ht-input" id="mainTitle" value="Manufacturing Planner" oninput="syncTitle()" placeholder="Project name...">
    </div>
    <button class="hbtn btn-print no-print" onclick="window.print()">Print / Export PDF</button>
  </div>
</div>

<div class="proj-tabs-wrap no-print" id="projTabs"></div>
<div class="plan-tabs-wrap no-print" id="planTabs"></div>

<div class="controls">
  <span class="lbl">Plan name</span>
  <input class="proj-input" id="planName" placeholder="Plan name...">
  <span class="lbl">Start date</span>
  <input type="date" id="startDate">
  <button class="btn-add no-print" onclick="addItem()">+ Add item</button>
  <div class="prio-toggle no-print">
    <label class="toggle-sw">
      <input type="checkbox" id="prioToggle" onchange="render()">
      <span class="toggle-track"></span>
      <span class="toggle-thumb"></span>
    </label>
    <span class="lbl">Priority</span>
  </div>
  <div class="view-toggle no-print">
    <button class="vt-btn active" id="vt-table" onclick="setView('table')">Table</button>
    <button class="vt-btn" id="vt-machine" onclick="setView('machine')">By Machine</button>
  </div>
</div>

<div class="scards" id="scards"></div>

<div id="tableView">
  <div class="sec">Items <span class="sec-line"></span></div>
  <div class="tbl-wrap">
    <table class="main-tbl">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="sec">Gantt chart <span class="sec-line"></span></div>
  <div class="gantt-section">
    <div class="gantt-scroll"><div id="gantt"></div></div>
    <div class="legend" id="ganttLegend"></div>
  </div>
</div>

<div id="machineView" class="machine-view">
  <div class="sec">By machine <span class="sec-line"></span></div>
  <div id="machineCards"></div>
</div>

</div><!-- /page -->

<script>
/* ══════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════ */
const MACHINES=['M1000','M2500','MRouter','Drilling','WireCut0001','T0001','Assembly'];
const BAR_COLORS=['#378ADD','#7c3aed','#059669','#d97706','#dc2626','#0891b2','#be185d'];

MACHINES.forEach((m,i)=>MCOLOR_IDX[m]=i);

const PRIO_LABELS={1:'P1 Critical',2:'P2 High',3:'P3 Normal',4:'P4 Low'};
const PRIO_CLS={1:'p1',2:'p2',3:'p3',4:'p4'};

const STATUS_OPTS=['Not Started','In Progress','Done','On Hold'];
const STATUS_CLS={'Not Started':'st-ns','In Progress':'st-ip','Done':'st-dn','On Hold':'st-oh'};

/* ══════════════════════════════════════════
   DATA
══════════════════════════════════════════ */
let projects=[
  {id:1,name:'LR-340',plans:[

      {id:6,erp:'RM-02719',desc:'C-Axis Cross Bearing Mount Plate',pn:'LRGN0/01-A0-006',qty:4,hrs:2.4,machine:'M1000',priority:3,status:'Not Started'},
      {id:7,erp:'RM-02630',desc:'Rotation Shaft Female',pn:'LRGNO/03-C0-003',qty:4,hrs:8,machine:'T0001',priority:2,status:'Not Started'},
      {id:8,erp:'RM-02631',desc:'Rotation Shaft Male',pn:'LRGNO/02-C0-002',qty:4,hrs:8,machine:'T0001',priority:2,status:'Not Started'},
      {id:9,erp:'RM-02761',desc:'Cross Bearing Mount Spacer',pn:'LRGN0/03-C0-005',qty:16,hrs:1.6,machine:'T0001',priority:3,status:'Not Started'},

      {id:11,erp:'RM-02777',desc:'Steel PIN D5x28x1.2mm',pn:'DIN EN 22340-B-5x28x1.2',qty:0,hrs:0.8,machine:'WireCut0001',priority:4,status:'Not Started'},
    ]},
    {id:2,name:'EOA Machining',startDate:todayStr(),machineStarts:{},items:[
      {id:12,erp:'RM-03017',desc:'Pallet Dispenser-Robot EOA',pn:'',qty:4,hrs:8,machine:'Assembly',priority:1,status:'Not Started'},
      {id:13,erp:'RM-03011',desc:'Pallet Gripper EOA Rib Support',pn:'PDEOA-01-0P-S60-00001-01',qty:4,hrs:3.04,machine:'M2500',priority:2,status:'Not Started'},

      {id:15,erp:'RM-03013',desc:'Pallet Gripper EOA Main Supports',pn:'PDEOA-01-0P-S60-00003-01',qty:8,hrs:16,machine:'M1000',priority:1,status:'Not Started'},
      {id:16,erp:'RM-03014',desc:'Pallet Gripper EOA Rotation Shaft',pn:'PDEOA-01-0P-S60-00004-01',qty:8,hrs:14,machine:'T0001',priority:1,status:'Not Started'},
      {id:17,erp:'RM-03015',desc:'Pallet Gripper EOA Came',pn:'PDEOA-01-0P-S60-00005-01',qty:8,hrs:8,machine:'MRouter',priority:2,status:'Not Started'},
      {id:18,erp:'RM-03016',desc:'Pallet Gripper EOA Gripper',pn:'PDEOA-01-0P-S60-00006-01',qty:16,hrs:3.04,machine:'Drilling',priority:3,status:'Not Started'},
    ]}

let activeProjId=1,activePlanId=1,nid=100;

/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
function todayStr(){return new Date().toISOString().split('T')[0];}
function getProj(){return projects.find(p=>p.id===activeProjId);}
function getPlan(){const pr=getProj();return pr?pr.plans.find(p=>p.id===activePlanId):null;}
function getItems(){const pl=getPlan();return pl?pl.items:[];}
function isWE(d){const w=d.getDay();return w===5||w===6;}
function cloneDay(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function skipWE(d){const r=cloneDay(d);while(isWE(r))r.setDate(r.getDate()+1);return r;}
function countWD(a,b){let c=0,d=cloneDay(a);const e=cloneDay(b);while(d<=e){if(!isWE(d))c++;d.setDate(d.getDate()+1);}return c;}
function fmtD(d){if(!d)return'—';return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function fmtShort(d){if(!d)return'—';return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function parseDate(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function mColorIdx(m){return MCOLOR_IDX[m]!==undefined?MCOLOR_IDX[m]:0;}

function getBase(){
  const pl=getPlan();
  return pl?parseDate(pl.startDate):null;
}
function getMachineBase(m){
  const pl=getPlan();if(!pl)return getBase();
  const ms=pl.machineStarts||{};
  return ms[m]?parseDate(ms[m]):getBase();
}

/* ══════════════════════════════════════════
   SCHEDULER — per-machine, own start date
══════════════════════════════════════════ */
function computeSched(){
  const pl=getPlan();
  const items=getItems();
  if(!pl)return items.map(it=>({...it,start:null,end:null,wdays:0}));

  const mCursor={};
  const mHours={};

  function initMachine(m){
    if(!mCursor[m]){
      mCursor[m]=skipWE(cloneDay(getMachineBase(m)||parseDate(pl.startDate)||new Date()));
      mHours[m]=8;
    }
  }

  return items.map(it=>{
    const m=it.machine||'M1000';
    initMachine(m);

    if(mHours[m]<=0){
      mCursor[m].setDate(mCursor[m].getDate()+1);
      while(isWE(mCursor[m]))mCursor[m].setDate(mCursor[m].getDate()+1);
      mHours[m]=8;
    }

    const startDay=cloneDay(mCursor[m]);
    let rem=Math.max(it.hrs,0.0001);
    while(rem>0){
      const consume=Math.min(rem,mHours[m]);
      rem-=consume; mHours[m]-=consume;
      if(rem>0){
        mCursor[m].setDate(mCursor[m].getDate()+1);
        while(isWE(mCursor[m]))mCursor[m].setDate(mCursor[m].getDate()+1);
        mHours[m]=8;
      }
    }
    const endDay=cloneDay(mCursor[m]);
    return{...it,start:startDay,end:endDay,wdays:countWD(startDay,endDay)};
  });
}

/* ══════════════════════════════════════════
   STATUS BADGE (manual only — no auto change)
══════════════════════════════════════════ */
function statusSelect(id,val){
  const opts=STATUS_OPTS.map(s=>`<option value="${s}"${s===val?' selected':''}>${s}</option>`).join('');
  const cls=STATUS_CLS[val]||'st-ns';
  return`<select class="status-sel ${cls}" onchange="upd(${id},'status',this.value);this.className='status-sel '+({'Not Started':'st-ns','In Progress':'st-ip','Done':'st-dn','On Hold':'st-oh'}[this.value]||'st-ns')">${opts}</select>`;
}

/* ══════════════════════════════════════════
   MACHINE COMBOBOX — fixed position, no re-render on input
══════════════════════════════════════════ */
let activeCombo=null;

function buildCombo(itemId,val,extraClass){
  const ec=extraClass||'';
  return`<div class="combo-wrap ${ec}">
    <input class="combo-input" id="ci_${itemId}" value="${esc(val)}"
      autocomplete="off"
      oninput="comboFilter(${itemId},this.value)"
      onfocus="comboOpen(${itemId})"
      onblur="comboClose(${itemId})"
      onkeydown="comboKey(event,${itemId})">
    <span class="combo-arrow">▼</span>
    <div class="combo-list" id="cl_${itemId}"></div>
  </div>`;
}

function comboFilter(itemId,q){
  // update item machine value WITHOUT full re-render
  const pl=getPlan();if(!pl)return;
  pl.items=pl.items.map(it=>it.id===itemId?{...it,machine:q}:it);
  // refresh dropdown options only
  populateComboList(itemId,q);
  // re-render gantt only (not table — keeps focus)
  const sched=computeSched();
  if(currentView==='table')renderGantt(sched);
  else renderMachineView(sched);
  renderSummary(sched);
}

function populateComboList(itemId,q){
  const list=document.getElementById('cl_'+itemId);
  if(!list)return;
  const filtered=MACHINES.filter(m=>m.toLowerCase().includes((q||'').toLowerCase()));
  list.innerHTML=filtered.map(m=>`<div class="combo-opt" onmousedown="comboPickOpt(${itemId},'${m}')">${m}</div>`).join('');
}

function comboOpen(itemId){
  if(activeCombo&&activeCombo!==itemId)comboClose(activeCombo);
  activeCombo=itemId;
  const inp=document.getElementById('ci_'+itemId);
  const list=document.getElementById('cl_'+itemId);
  if(!inp||!list)return;
  populateComboList(itemId,inp.value);
  // position list using fixed coords
  const rect=inp.getBoundingClientRect();
  list.style.top=(rect.bottom+window.scrollY)+'px';
  list.style.left=(rect.left+window.scrollX)+'px';
  list.style.width=Math.max(rect.width,140)+'px';
  list.classList.add('open');
}

function comboClose(itemId){
  const list=document.getElementById('cl_'+itemId);
  if(list)list.classList.remove('open');
  if(activeCombo===itemId)activeCombo=null;
}

function comboPickOpt(itemId,m){
  // mousedown fires before blur — update model and input
  const pl=getPlan();if(!pl)return;
  pl.items=pl.items.map(it=>it.id===itemId?{...it,machine:m}:it);
  const inp=document.getElementById('ci_'+itemId);
  if(inp)inp.value=m;
  comboClose(itemId);
  render();
}

function comboKey(e,itemId){
  if(e.key==='Escape')comboClose(itemId);
  if(e.key==='Enter'){comboClose(itemId);render();}
}

/* ══════════════════════════════════════════
   MUTATIONS
══════════════════════════════════════════ */
function upd(id,f,v){
  const pl=getPlan();if(!pl)return;
  pl.items=pl.items.map(it=>it.id===id?{...it,[f]:(f==='hrs'||f==='qty'||f==='priority')?+v:v}:it);
  render();
}
function delItem(id){const pl=getPlan();if(!pl)return;pl.items=pl.items.filter(it=>it.id!==id);render();}
function addItem(){
  const pl=getPlan();if(!pl)return;
  pl.items.push({id:nid++,erp:'RM-NEW',desc:'New item',pn:'',qty:1,hrs:8,machine:'M1000',priority:3,status:'Not Started'});
  render();
}
function moveItem(fromIdx,toIdx){
  const pl=getPlan();if(!pl)return;
  const arr=[...pl.items];
  const[moved]=arr.splice(fromIdx,1);
  arr.splice(toIdx,0,moved);
  pl.items=arr;render();
}
function moveMachineItem(m,fromIdx,toIdx){
  const pl=getPlan();if(!pl)return;
  // get global indices of this machine's items
  const mIdxs=pl.items.map((it,gi)=>it.machine===m?gi:-1).filter(gi=>gi>=0);
  if(!mIdxs[fromIdx]===undefined||mIdxs[toIdx]===undefined)return;
  const arr=[...pl.items];
  const fromGlobal=mIdxs[fromIdx];
  const toGlobal=mIdxs[toIdx];
  const[moved]=arr.splice(fromGlobal,1);
  arr.splice(toGlobal,0,moved);
  pl.items=arr;render();
}
function setMachineStart(m,val){
  const pl=getPlan();if(!pl)return;
  if(!pl.machineStarts)pl.machineStarts={};
  pl.machineStarts[m]=val;
  render();
}

/* PROJECT / PLAN MANAGEMENT */
function addProject(){
  const name=prompt('Project name:','New Project');if(!name)return;
  const id=Date.now(),planId=id+1;
  projects.push({id,name,plans:[{id:planId,name:'Plan 1',startDate:todayStr(),machineStarts:{},items:[]}]});
  activeProjId=id;activePlanId=planId;render();
}
function delProject(id,e){
  e.stopPropagation();
  if(projects.length<=1){alert('At least one project required.');return;}
  if(!confirm('Delete project?'))return;
  projects=projects.filter(p=>p.id!==id);
  activeProjId=projects[0].id;activePlanId=projects[0].plans[0].id;render();
}
function switchProject(id){activeProjId=id;activePlanId=getProj().plans[0].id;render();}

function addPlan(){
  const pr=getProj();if(!pr)return;
  const name=prompt('Plan name:','New Plan');if(!name)return;
  const id=Date.now();
  pr.plans.push({id,name,startDate:todayStr(),machineStarts:{},items:[]});
  activePlanId=id;render();
}
function delPlan(id,e){
  e.stopPropagation();
  const pr=getProj();if(!pr)return;
  if(pr.plans.length<=1){alert('At least one plan required.');return;}
  if(!confirm('Delete plan?'))return;
  pr.plans=pr.plans.filter(p=>p.id!==id);
  activePlanId=pr.plans[0].id;render();
}
function switchPlan(id){activePlanId=id;render();}

/* ══════════════════════════════════════════
   DRAG & DROP — TABLE VIEW
══════════════════════════════════════════ */
function dragStart(e,idx){
  dragSrc={type:'table',fromIdx:idx};
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',idx);
}
function dragOver(e,idx){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  document.querySelectorAll('#tbody tr').forEach(r=>r.classList.remove('drag-over'));
  if(dragSrc&&dragSrc.fromIdx!==idx)e.currentTarget.classList.add('drag-over');
}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function drop(e,toIdx){
  e.preventDefault();
  document.querySelectorAll('#tbody tr').forEach(r=>{r.classList.remove('drag-over');r.classList.remove('dragging');});
  if(dragSrc&&dragSrc.type==='table'&&dragSrc.fromIdx!==toIdx)moveItem(dragSrc.fromIdx,toIdx);
  dragSrc=null;
}

/* ══════════════════════════════════════════
   DRAG & DROP — MACHINE VIEW
══════════════════════════════════════════ */
function mvDragStart(e,machine,idx){
  dragSrc={type:'machine',machine,fromIdx:idx};
  e.currentTarget.classList.add('mv-dragging');
  e.dataTransfer.effectAllowed='move';
}
function mvDragOver(e,machine,idx){
  e.preventDefault();
  document.querySelectorAll('.mv-table tr').forEach(r=>r.classList.remove('mv-drag-over'));
  if(dragSrc&&dragSrc.machine===machine&&dragSrc.fromIdx!==idx)e.currentTarget.classList.add('mv-drag-over');
}
function mvDragLeave(e){e.currentTarget.classList.remove('mv-drag-over');}
function mvDrop(e,machine,toIdx){
  e.preventDefault();
  document.querySelectorAll('.mv-table tr').forEach(r=>{r.classList.remove('mv-drag-over');r.classList.remove('mv-dragging');});
  if(dragSrc&&dragSrc.type==='machine'&&dragSrc.machine===machine&&dragSrc.fromIdx!==toIdx)
    moveMachineItem(machine,dragSrc.fromIdx,toIdx);
  dragSrc=null;
}

/* ══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
function render(){
  renderProjTabs();
  renderPlanTabs();
  renderControls();
  const sched=computeSched();
  renderSummary(sched);
  if(currentView==='table'){renderTable(sched);renderGantt(sched);}
  else renderMachineView(sched);
  const pl=getPlan();
  const pr=getProj();
  const titleEl=document.getElementById('mainTitle');
  if(titleEl&&!titleEl.matches(':focus'))
    titleEl.value=(pr?pr.name:'')+(pl?' — '+pl.name:'');
}

function renderProjTabs(){
  const el=document.getElementById('projTabs');
  let h='';
  projects.forEach(p=>{
    const a=p.id===activeProjId;
    h+=`<button class="tab-btn${a?' active':''}" onclick="switchProject(${p.id})">${esc(p.name)}<button class="tab-x" onclick="delProject(${p.id},event)">×</button></button>`;
  });
  h+=`<button class="tab-add" onclick="addProject()">+ Project</button>`;
  el.innerHTML=h;
}
function renderPlanTabs(){
  const pr=getProj();const el=document.getElementById('planTabs');
  if(!pr){el.innerHTML='';return;}
  let h='';
  pr.plans.forEach(p=>{
    const a=p.id===activePlanId;
    h+=`<button class="plan-tab${a?' active':''}" onclick="switchPlan(${p.id})">${esc(p.name)}<button class="plan-x" onclick="delPlan(${p.id},event)">×</button></button>`;
  });
  h+=`<button class="plan-add" onclick="addPlan()">+ Plan</button>`;
  el.innerHTML=h;
}
function renderControls(){
  const pl=getPlan();if(!pl)return;
  const pn=document.getElementById('planName');
  const sd=document.getElementById('startDate');
  if(!pn.matches(':focus'))pn.value=pl.name||'';
  if(!sd.matches(':focus'))sd.value=pl.startDate||'';

function renderSummary(sched){
  const items=getItems();
  const pl=getPlan();
  const base=getBase();
  const totHrs=items.reduce((a,b)=>a+b.hrs,0);
  const ends=sched.filter(x=>x.end).map(x=>x.end.getTime());
  const pEnd=ends.length?new Date(Math.max(...ends)):null;
  const wd=base&&pEnd?countWD(base,pEnd):0;
  const machines=[...new Set(items.map(it=>it.machine))].filter(Boolean);
  document.getElementById('scards').innerHTML=`
    <div class="sc"><div class="sl">Items</div><div class="sv">${items.length}</div></div>
    <div class="sc"><div class="sl">Total hrs</div><div class="sv">${totHrs.toFixed(1)}</div></div>
    <div class="sc"><div class="sl">Working days</div><div class="sv">${wd||'—'}</div></div>
    <div class="sc"><div class="sl">Machines</div><div class="sv">${machines.length}</div></div>
    <div class="sc"><div class="sl">Project end</div><div class="sv" style="font-size:12px">${fmtD(pEnd)||'—'}</div></div>
  `;
}

/* ══════════════════════════════════════════
   GANTT RENDER
══════════════════════════════════════════ */
function renderGantt(sched){
  const g=document.getElementById('gantt');
  const base=getBase();
  const valid=sched.filter(x=>x.start&&x.end);
  if(!base||!valid.length){
    g.innerHTML=`<div style="padding:2rem;text-align:center;font-size:12px;color:#94a3b8">Set a start date to see the Gantt chart</div>`;
    document.getElementById('ganttLegend').innerHTML='';return;
  }
  const projEnd=new Date(Math.max(...valid.map(x=>x.end.getTime())));
  const totalDays=Math.ceil((projEnd.getTime()-base.getTime())/864e5)+5;
  const tod=cloneDay(new Date());

  let months=[],mCur=null,mCnt=0;
  for(let i=0;i<totalDays;i++){
    const d=new Date(base.getFullYear(),base.getMonth(),base.getDate()+i);
    const mk=d.getFullYear()+'-'+d.getMonth();
    if(mk!==mCur){if(mCur)months.push({label:mCur,count:mCnt});mCur=mk;mCnt=1;}else mCnt++;
  }
  if(mCur)months.push({label:mCur,count:mCnt});

  const DW=20;
  let html='<div style="display:inline-block;min-width:max-content">';
  html+='<div class="gh-month-row"><div class="gh-month-lbl">Item</div>';
  months.forEach(m=>{
    const[y,mo]=m.label.split('-').map(Number);
    const lbl=new Date(y,mo,1).toLocaleDateString('en-GB',{month:'short',year:'numeric'});
    html+=`<div class="gh-month-cell" style="width:${m.count*DW}px;min-width:${m.count*DW}px">${lbl}</div>`;
  });
  html+='</div>';
  html+='<div class="gh-row"><div class="gh-lbl">ERP — Description</div>';
  for(let i=0;i<totalDays;i++){
    const d=new Date(base.getFullYear(),base.getMonth(),base.getDate()+i);
    const we=isWE(d),isT=d.getTime()===tod.getTime();
    html+=`<div class="gh-day${we?' we':''}${isT?' tod':''}">${d.getDate()}</div>`;
  }
  html+='</div>';
  sched.forEach(it=>{
    const mc=mColorIdx(it.machine);
    html+=`<div class="gr-row"><div class="gr-lbl" title="${esc(it.erp)} — ${esc(it.desc)}">${esc(it.erp)} — ${esc(it.desc)}</div>`;
    for(let i=0;i<totalDays;i++){
      const d=new Date(base.getFullYear(),base.getMonth(),base.getDate()+i);
      const we=isWE(d),isT=d.getTime()===tod.getTime();
      let cls='gc';
      if(we)cls+=' we';
      if(isT)cls+=' tod';
      if(it.start&&it.end&&!we){
        const dT=d.getTime(),sT=it.start.getTime(),eT=it.end.getTime();
        if(dT>=sT&&dT<=eT){
          const isS=dT===sT,isE=dT===eT;
          const p=`m${mc}`;
          cls+=isS&&isE?` ${p}-se`:isS?` ${p}-s`:isE?` ${p}-e`:` ${p}`;
        }
      }
      html+=`<div class="${cls}"></div>`;
    }
    html+='</div>';
  });
  html+='</div>';
  g.innerHTML=html;

  const usedM=[...new Set(getItems().map(it=>it.machine).filter(Boolean))];
  let leg=`<span class="leg-item"><span class="leg-dot" style="background:#fff5f5;border:1px solid #fca5a5"></span>Weekend</span>`;
  leg+=`<span class="leg-item"><span style="width:2px;height:11px;background:#f59e0b;display:inline-block"></span>Today</span>`;
  usedM.forEach(m=>{
    const ci=mColorIdx(m);
    leg+=`<span class="leg-item"><span class="leg-dot" style="background:${BAR_COLORS[ci]}"></span>${esc(m)}</span>`;
  });
  document.getElementById('ganttLegend').innerHTML=leg;
}

/* ══════════════════════════════════════════
   MACHINE VIEW RENDER
══════════════════════════════════════════ */
function renderMachineView(sched){
  const items=getItems();
  const pl=getPlan();
  const machines=[...new Set(items.map(it=>it.machine).filter(Boolean))].sort();
  let html='';

  machines.forEach(m=>{
    const ci=mColorIdx(m);
    const color=BAR_COLORS[ci];
    const mItems=sched.filter(it=>it.machine===m);
    const totHrs=mItems.reduce((a,b)=>a+b.hrs,0);
    const ends=mItems.filter(x=>x.end).map(x=>x.end.getTime());
    const mEnd=ends.length?new Date(Math.max(...ends)):null;
    const mStart=(pl&&pl.machineStarts&&pl.machineStarts[m])||pl.startDate||'';

    html+=`<div class="mv-card">
      <div class="mv-header" style="background:${color}12;border-left:5px solid ${color}">
        <div class="mh-left">
          <span class="mh-name" style="color:${color}">${esc(m)}</span>
          <span class="mh-stats">
            <span>${mItems.length} items</span>
            <span>${totHrs.toFixed(1)} hrs</span>
            <span>Ends: ${fmtD(mEnd)}</span>
          </span>
        </div>
        <div class="mh-start no-print">
          <span class="lbl">Machine start:</span>
          <input type="date" value="${mStart}" onchange="setMachineStart('${m}',this.value)" style="font-size:11px;padding:3px 7px;border-radius:5px;border:1px solid #cbd5e1;background:#fff">
        </div>
      </div>
      <div class="mv-body">
      <table class="mv-table">
      <thead><tr>
        <th style="width:24px" class="no-print"></th>
        <th style="width:28px">#</th>
        <th style="min-width:80px">ERP</th>
        <th style="min-width:140px">Description</th>
        <th style="min-width:90px">Part No.</th>
        <th style="width:60px">Qty</th>
        <th style="width:54px">Hrs</th>
        <th style="width:82px">Start</th>
        <th style="width:82px">End</th>
        <th style="width:50px">W.days</th>
        <th style="width:96px">Status</th>
        <th style="width:26px" class="no-print"></th>
      </tr></thead>
      <tbody>`;

    mItems.forEach((it,i)=>{
      html+=`<tr draggable="true"
        ondragstart="mvDragStart(event,'${m}',${i})"
        ondragover="mvDragOver(event,'${m}',${i})"
        ondrop="mvDrop(event,'${m}',${i})"
        ondragleave="mvDragLeave(event)">
        <td class="no-print"><div class="drag-handle">⠿</div></td>
        <td style="text-align:center;color:#94a3b8;font-size:11px">${i+1}</td>
        <td><input class="ei ei-mono" value="${esc(it.erp)}" onchange="upd(${it.id},'erp',this.value)" style="min-width:70px"></td>
        <td><input class="ei" value="${esc(it.desc)}" onchange="upd(${it.id},'desc',this.value)" style="min-width:120px"></td>
        <td><input class="ei ei-mono" value="${esc(it.pn)}" onchange="upd(${it.id},'pn',this.value)" style="min-width:80px"></td>
        <td><input class="ei ei-c" type="number" min="0" value="${it.qty}" onchange="upd(${it.id},'qty',this.value)" style="width:52px;min-width:52px"></td>
        <td><input class="ei ei-c" type="number" min="0" step="0.5" value="${it.hrs}" onchange="upd(${it.id},'hrs',this.value)" style="width:50px"></td>
        <td style="white-space:nowrap;font-size:11px;text-align:center;color:#475569">${fmtShort(it.start)}</td>
        <td style="white-space:nowrap;font-size:11px;text-align:center;color:#475569">${fmtShort(it.end)}</td>
        <td style="text-align:center;font-size:12px;font-weight:700;color:#0d1b4b">${it.wdays||'—'}</td>
        <td>${statusSelect(it.id,it.status||'Not Started')}</td>
        <td class="no-print"><button class="del-btn" onclick="delItem(${it.id})">×</button></td>
      </tr>`;
    });

    html+=`</tbody></table></div></div>`;
  });

  document.getElementById('machineCards').innerHTML=html||'<div style="padding:2rem;text-align:center;color:#94a3b8">No items yet</div>';
}

/* ══════════════════════════════════════════
   LIVE INPUTS
══════════════════════════════════════════ */
document.getElementById('startDate').addEventListener('change',function(){
  const pl=getPlan();if(!pl)return;pl.startDate=this.value;render();
});
document.getElementById('planName').addEventListener('input',function(){
  const pl=getPlan();if(!pl)return;pl.name=this.value;renderPlanTabs();
});
document.getElementById('mainTitle').addEventListener('input',function(){
  // just let user type — no full render needed
});

// close any open combo on outside click
document.addEventListener('click',function(e){
  if(!e.target.closest('.combo-wrap')&&activeCombo!==null){
    comboClose(activeCombo);
  }
});

// init
setView('table');
render();
</script>
</body>
</html>
